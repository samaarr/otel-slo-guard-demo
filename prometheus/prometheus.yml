global:
  scrape_interval: 5s
  scrape_timeout: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: "service_a"
    static_configs:
      - targets: ["service_a:8001"]

  - job_name: "service_b"
    static_configs:
      - targets: ["service_b:8002"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
